version: "2"

linters:
  settings:
    errcheck:
      # Idiomatic patterns where the error is intentionally ignored.
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
        - (net/http.ResponseWriter).Write
        - (*text/tabwriter.Writer).Flush
        - fmt.Fprint
        - fmt.Fprintf
        - fmt.Fprintln
